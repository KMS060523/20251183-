<!DOCTYPE html>
<html>
<head>
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
</head>
<body>
    <a-scene>
        <a-camera position="0 3 6">
        </a-camera>
        <a-sky color="#8BE6FF">
        </a-sky>

        
        <a-plane position="0 0 0" rotation="-90 0 0" width="16" height="35" color="#444444">
        </a-plane>

        
        <a-cylinder position="-3 2 -2" radius="0.2" height="4" color="#FF5722">
        </a-cylinder>
        <a-cylinder position="-1 2 -2" radius="0.2" height="4" color="#FF5722">
        </a-cylinder>
        <a-cylinder position="1 2 -2" radius="0.2" height="4" color="#FF5722">
        </a-cylinder>
        <a-cylinder position="3 2 -2" radius="0.2" height="4" color="#FF5722">
        </a-cylinder>

      
        <a-box position="-2 1 -2" width="1.8" height="2" depth="0.2" color="#FFC107"
               animation="property: position; from: -2 1 -2; to: -2 3 -2; dir: alternate; dur: 2000; easing: linear; loop:true">
        </a-box>
        <a-box position="0 2 -2" width="1.8" height="2" depth="0.2" color="#FFC107"
               animation="property: position; from: 0 2 -2; to: 0 0 -2; dir: alternate; dur: 1500; easing: linear; loop:true">
        </a-box>
        <a-box position="2 1 -2" width="1.8" height="2" depth="0.2" color="#FFC107"
               animation="property: position; from: 2 1 -2; to: 2 3 -2; dir: alternate; dur: 2500; easing: linear; loop:true">
        </a-box>

        
        <a-box position="0 1 -7" width="8" height="0.2" depth="4" color="#E91E63"
               animation="property: rotation; from: 0 0 -15; to: 0 0 15; dir: alternate; dur: 3000; easing: linear; loop:true">
        </a-box>

        <a-cylinder position="0 -1.5 0" radius="0.1" height="3" color="#9C27B0"
                    animation="property: rotation; from: 0 0 -15; to: 0 0 15; dir: alternate; dur: 3000; easing: linear; loop:true">
        </a-cylinder>


        <a-box position="0 -3 0" width="0.4" height="0.4" depth="0.4" color="#00BCD4"
               animation="property: position; from: 0 -3 0; to: 0 3 0; dir: alternate; dur: 3000; easing: linear; loop:true">
        </a-box>
        

    </a-scene>
</body>
</html>
